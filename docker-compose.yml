# dock.mau.dev uses a separate JWT auth server (mau.dev/jwt/auth) that WUD cannot
# follow anonymously. Set wud.watch=false until WUD_REGISTRY_GITLAB_MAUDEV_TOKEN is added.
# To enable auto-update: add a mau.dev read_registry PAT to .env as MAUDEV_TOKEN,
# then set WUD_REGISTRY_GITLAB_MAUDEV_TOKEN=${MAUDEV_TOKEN} in the wud service.
x-wud-calver: &wud-calver
  labels:
    wud.watch: "false"
    wud.tag.include: '^v0\.\d{4}\.\d+$$'
    wud.compose.file: /wud/docker-compose.yml

x-wud-semver: &wud-semver
  labels:
    wud.watch: "false"
    wud.tag.include: '^v\d+\.\d+\.\d+$$'
    wud.compose.file: /wud/docker-compose.yml

x-wud-off: &wud-off
  labels:
    wud.watch: "false"

services:

  postgres:
    image: postgres:16-alpine
    <<: *wud-off
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TZ}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  synapse:
    image: matrixdotorg/synapse:latest
    <<: *wud-off
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_DOMAIN}
      SYNAPSE_REPORT_STATS: "no"
      TZ: ${TZ}
    volumes:
      - ./synapse:/data
    ports:
      - "127.0.0.1:8008:8008"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    <<: *wud-off
    depends_on:
      synapse:
        condition: service_started
    ports:
      - "${CADDY_PORT:-8080}:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./stickers/web:/srv/stickerpicker:ro
    restart: unless-stopped

  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:v0.2605.0
    <<: *wud-calver
    profiles:
      - whatsapp
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/whatsapp:/data
    restart: unless-stopped

  mautrix-telegram:
    image: dock.mau.dev/mautrix/telegram:v0.2605.0
    <<: *wud-calver
    profiles:
      - telegram
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/telegram:/data
    restart: unless-stopped

  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:v0.2605.0
    <<: *wud-calver
    profiles:
      - signal
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/signal:/data
    restart: unless-stopped

  mautrix-discord:
    image: dock.mau.dev/mautrix/discord:v0.7.6
    <<: *wud-semver
    profiles:
      - discord
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/discord:/data
    restart: unless-stopped

  mautrix-slack:
    image: dock.mau.dev/mautrix/slack:v0.2605.0
    <<: *wud-calver
    profiles:
      - slack
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/slack:/data
    restart: unless-stopped

  mautrix-gmessages:
    image: dock.mau.dev/mautrix/gmessages:v0.2605.0
    <<: *wud-calver
    profiles:
      - gmessages
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/gmessages:/data
    restart: unless-stopped

  mautrix-twitter:
    image: dock.mau.dev/mautrix/twitter:v0.2604.0
    <<: *wud-calver
    profiles:
      - twitter
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/twitter:/data
    restart: unless-stopped

  mautrix-googlechat:
    image: dock.mau.dev/mautrix/googlechat:v0.5.2
    <<: *wud-semver
    profiles:
      - googlechat
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/googlechat:/data
    restart: unless-stopped

  mautrix-linkedin:
    image: ghcr.io/beeper/linkedin:v0.5.4
    labels:
      wud.watch: "true"
      wud.tag.include: '^v\d+\.\d+\.\d+$$'
      wud.compose.file: /wud/docker-compose.yml
    profiles:
      - linkedin
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/linkedin:/data
    restart: unless-stopped

  mautrix-meta-fb:
    image: dock.mau.dev/mautrix/meta:v0.2605.0
    <<: *wud-calver
    profiles:
      - meta-fb
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/meta-fb:/data
    restart: unless-stopped

  mautrix-meta-ig:
    image: dock.mau.dev/mautrix/meta:v0.2605.0
    <<: *wud-calver
    profiles:
      - meta-ig
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/meta-ig:/data
    restart: unless-stopped

  # NOTE: stt-cpu and stt-gpu share volume paths (./stt-bot/data/db, etc.).
  # Running both profiles simultaneously will cause SQLite lock contention / corruption.
  # Treat stt-cpu and stt-gpu as mutually exclusive.
  matrix-stt-bot:
    image: ghcr.io/hibobmaster/matrix-stt-bot@sha256:4862f1472d1456c68be795c013537b166b21579a6af0ff4f8d784e6061c9dd92
    <<: *wud-off
    profiles:
      - stt-cpu
    depends_on:
      synapse:
        condition: service_started
    environment:
      TZ: ${TZ}
    volumes:
      - ./stt-bot/config.json:/app/config.json:ro
      - ./stt-bot/data/db:/app/db
      - ./stt-bot/data/models:/app/models
      - ./stt-bot/element-keys.txt:/app/element-keys.txt:ro
    restart: unless-stopped

  matrix-stt-bot-gpu:
    build:
      context: ./stt-bot
      dockerfile: Dockerfile.gpu
    image: matrix-stt-bot:gpu-local
    <<: *wud-off
    profiles:
      - stt-gpu
    depends_on:
      synapse:
        condition: service_started
    environment:
      TZ: ${TZ}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./stt-bot/config.json:/app/config.json:ro
      - ./stt-bot/data/db:/app/db
      - ./stt-bot/data/models:/app/models
      - ./stt-bot/element-keys.txt:/app/element-keys.txt:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    restart: unless-stopped

  libretranslate:
    image: libretranslate/libretranslate:latest
    <<: *wud-off
    profiles:
      - translate
    environment:
      LT_DISABLE_WEB_UI: "false"
      LT_LOAD_ONLY: "${LT_LANGUAGES:-en,fr,es,de,pt,it,ar,zh,ja}"
      LT_UPDATE_MODELS: "false"
    volumes:
      - ./libretranslate/data:/home/libretranslate/.local
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\" 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  matrix-translate-bot:
    build:
      context: ./translate-bot
      dockerfile: Dockerfile
    image: matrix-translate-bot:local
    <<: *wud-off
    profiles:
      - translate
    depends_on:
      synapse:
        condition: service_started
      libretranslate:
        condition: service_healthy
    volumes:
      - ./translate-bot/config.json:/app/config.json:ro
      - ./translate-bot/data/store:/app/store
      - ./translate-bot/data/models:/app/models
    environment:
      TZ: ${TZ}
    restart: unless-stopped

  claude-notify-bot:
    build:
      context: ./claude-notify-bot
      dockerfile: Dockerfile
    image: claude-notify-bot:local
    <<: *wud-off
    profiles:
      - claude-notify
    depends_on:
      synapse:
        condition: service_started
    ports:
      - "8095:8095"
    volumes:
      - ./claude-notify-bot/config.json:/app/config.json:ro
      - ./claude-notify-bot/data/store:/app/store
    environment:
      TZ: ${TZ}
    restart: unless-stopped

  cookie-refresher:
    build:
      context: ./cookie-refresher
      dockerfile: Dockerfile
    image: matrix-cookie-refresher:local
    <<: *wud-off
    profiles:
      - cookie-refresher
    depends_on:
      synapse:
        condition: service_started
    volumes:
      - ./cookie-refresher/config.json:/app/config.json:ro
      - ./cookie-refresher/data:/app/data
    environment:
      TZ: ${TZ}
      COOKIE_REFRESHER_KEY: ${COOKIE_REFRESHER_KEY:-}
    restart: unless-stopped

  matrix-sticker-importer:
    build:
      context: ./stickers
      dockerfile: Dockerfile
    image: matrix-sticker-importer:local
    <<: *wud-off
    command: ["python3", "import.py"]
    profiles:
      - stickers
    depends_on:
      synapse:
        condition: service_started
    volumes:
      - ./stickers/config.json:/app/config.json:ro
      - ./stickers/data:/app/data
      - ./stickers/web/packs:/app/packs
      - ./stickers/input:/input:ro
    environment:
      TZ: ${TZ}
    restart: "no"

  matrix-sticker-bot:
    image: matrix-sticker-importer:local
    <<: *wud-off
    command: ["python3", "bot.py"]
    profiles:
      - stickers
    depends_on:
      synapse:
        condition: service_started
    volumes:
      - ./stickers/config.json:/app/config.json:ro
      - ./stickers/data:/app/data
      - ./stickers/web/packs:/app/packs
    environment:
      TZ: ${TZ}
    restart: unless-stopped

  wud:
    image: getwud/wud
    <<: *wud-off
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/wud/docker-compose.yml
    environment:
      - WUD_WATCHER_LOCAL_CRON=0 * * * *
      - WUD_TRIGGER_DOCKERCOMPOSE_LOCAL_FILE=/wud/docker-compose.yml
      - WUD_TRIGGER_DOCKERCOMPOSE_LOCAL_BACKUP=true
      - WUD_TRIGGER_DOCKERCOMPOSE_LOCAL_PRUNE=true
