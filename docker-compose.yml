x-watchtower-managed: &watchtower-managed
  labels:
    com.centurylinklabs.watchtower.enable: "true"

services:

  postgres:
    image: postgres:16-alpine
    <<: *watchtower-managed
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: ${TZ}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  synapse:
    image: matrixdotorg/synapse:latest
    <<: *watchtower-managed
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_SERVER_NAME: ${MATRIX_DOMAIN}
      SYNAPSE_REPORT_STATS: "no"
      TZ: ${TZ}
    volumes:
      - ./synapse:/data
    ports:
      - "127.0.0.1:8008:8008"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    <<: *watchtower-managed
    depends_on:
      synapse:
        condition: service_started
    ports:
      - "${CADDY_PORT:-8080}:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
    restart: unless-stopped

  mautrix-whatsapp:
    image: dock.mau.dev/mautrix/whatsapp:latest
    <<: *watchtower-managed
    profiles:
      - whatsapp
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/whatsapp:/data
    restart: unless-stopped

  mautrix-telegram:
    image: dock.mau.dev/mautrix/telegram:latest
    <<: *watchtower-managed
    profiles:
      - telegram
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/telegram:/data
    restart: unless-stopped

  mautrix-signal:
    image: dock.mau.dev/mautrix/signal:latest
    <<: *watchtower-managed
    profiles:
      - signal
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/signal:/data
    restart: unless-stopped

  mautrix-discord:
    image: dock.mau.dev/mautrix/discord:latest
    <<: *watchtower-managed
    profiles:
      - discord
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/discord:/data
    restart: unless-stopped

  mautrix-meta:
    image: dock.mau.dev/mautrix/meta:latest
    <<: *watchtower-managed
    profiles:
      - meta
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./bridges/meta:/data
    restart: unless-stopped

  # NOTE: stt-cpu and stt-gpu share volume paths (./stt-bot/data/db, etc.).
  # Running both profiles simultaneously will cause SQLite lock contention / corruption.
  # Treat stt-cpu and stt-gpu as mutually exclusive.
  matrix-stt-bot:
    image: ghcr.io/hibobmaster/matrix-stt-bot:latest
    <<: *watchtower-managed
    profiles:
      - stt-cpu
    depends_on:
      synapse:
        condition: service_started
    environment:
      TZ: ${TZ}
    volumes:
      - ./stt-bot/config.json:/app/config.json:ro
      - ./stt-bot/data/db:/app/db
      - ./stt-bot/data/models:/app/models
      - ./stt-bot/element-keys.txt:/app/element-keys.txt:ro
    restart: unless-stopped

  matrix-stt-bot-gpu:
    build:
      context: ./stt-bot
      dockerfile: Dockerfile.gpu
    image: matrix-stt-bot:gpu-local
    profiles:
      - stt-gpu
    depends_on:
      synapse:
        condition: service_started
    environment:
      TZ: ${TZ}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./stt-bot/config.json:/app/config.json:ro
      - ./stt-bot/data/db:/app/db
      - ./stt-bot/data/models:/app/models
      - ./stt-bot/element-keys.txt:/app/element-keys.txt:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:latest
    <<: *watchtower-managed
    environment:
      TZ: ${TZ}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: ${WATCHTOWER_CLEANUP}
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_INTERVAL}
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_NOTIFICATION_URL: ${WATCHTOWER_NOTIFICATION_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
