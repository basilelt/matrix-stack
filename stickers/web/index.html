<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stickers</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #f9f9f9;
    color: #222;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #ddd; }
    #tabs { background: #252525; border-color: #3a3a3a; }
    .tab { color: #aaa; }
    .tab.active { background: #333; color: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
    .tab:hover:not(.active) { background: #2e2e2e; }
    .sticker:hover { background: #2e2e2e; }
    #message { color: #888; }
  }

  #tabs {
    display: flex;
    gap: 4px;
    padding: 6px 8px;
    background: #efefef;
    border-bottom: 1px solid #ddd;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 4px 10px;
    border-radius: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-size: 12px;
    flex-shrink: 0;
    border: none;
    background: transparent;
    color: #555;
  }
  .tab.active {
    background: #fff;
    color: #111;
    box-shadow: 0 1px 3px rgba(0,0,0,.15);
  }
  .tab:hover:not(.active) { background: #e2e2e2; }

  #grid {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    align-content: start;
  }

  .sticker {
    aspect-ratio: 1;
    cursor: pointer;
    border-radius: 8px;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.08s;
  }
  .sticker:hover { background: #e8e8e8; }
  .sticker:active { transform: scale(0.92); }
  .sticker img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border-radius: 4px;
  }

  #message {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: #999;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div id="tabs"></div>
<div id="grid"><div id="message">Loading…</div></div>
<script>
const tabsEl = document.getElementById("tabs");
const gridEl = document.getElementById("grid");

let packs = {};
let widgetId = null;

function mxcToUrl(mxc) {
  const m = mxc.match(/^mxc:\/\/([^/]+)\/(.+)$/);
  if (!m) return mxc;
  return `${location.origin}/_matrix/media/v3/download/${m[1]}/${m[2]}`;
}

// Element injects widgetId as a URL query param
widgetId = new URLSearchParams(location.search).get("widgetId") || null;

// Widget API v2 — respond to toWidget messages from Element
// Keep original request fields (including api) and add response — this is what Element expects
window.onmessage = (ev) => {
  if (!window.parent || !ev.data) return;
  const req = ev.data;
  if (!req.action) return;
  if (!widgetId && req.widgetId) widgetId = req.widgetId;

  if (req.action === "capabilities") {
    window.parent.postMessage({ ...req, response: { capabilities: ["m.sticker"] } }, "*");
  } else if (req.action === "visibility" || req.action === "notify_capabilities" || req.action === "theme_change") {
    window.parent.postMessage({ ...req, response: {} }, "*");
  }
};

function sendSticker(s) {
  const name = s.body || s.id || "sticker";
  window.parent.postMessage({
    api: "fromWidget",
    action: "m.sticker",
    requestId: `sticker-${Date.now()}`,
    widgetId: widgetId || "stickerpicker",
    data: {
      name,
      description: name,
      file: `${s.id || "sticker"}.webp`,
      content: { body: name, msgtype: "m.sticker", url: s.url, info: s.info || {} },
    },
  }, "*");
}

function renderPack(packId) {
  const pack = packs[packId];
  gridEl.innerHTML = "";
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.id === packId));

  if (!pack || !pack.stickers || pack.stickers.length === 0) {
    gridEl.innerHTML = '<div id="message">No stickers in this pack.</div>';
    return;
  }
  pack.stickers.forEach(s => {
    const div = document.createElement("div");
    div.className = "sticker";
    div.title = s.body || s.id;
    const img = document.createElement("img");
    img.src = mxcToUrl(s.url);
    img.alt = s.body || s.id;
    img.loading = "lazy";
    div.appendChild(img);
    div.addEventListener("click", () => sendSticker(s));
    gridEl.appendChild(div);
  });
}

function addTab(pack) {
  const btn = document.createElement("button");
  btn.className = "tab";
  btn.dataset.id = pack.id;
  btn.textContent = pack.title;
  btn.addEventListener("click", () => renderPack(pack.id));
  tabsEl.appendChild(btn);
}

async function load() {
  try {
    const indexRes = await fetch("packs/index.json");
    if (!indexRes.ok) throw new Error(`HTTP ${indexRes.status} on packs/index.json`);
    const packIds = await indexRes.json();

    if (!packIds.length) {
      gridEl.innerHTML = '<div id="message">No sticker packs yet.<br>Run the importer to add packs.</div>';
      return;
    }

    const results = await Promise.allSettled(
      packIds.map(id => fetch(`packs/${id}.json`).then(r => r.ok ? r.json() : Promise.reject(r.status)))
    );
    results.forEach(r => {
      if (r.status === "fulfilled" && r.value) {
        packs[r.value.id] = r.value;
        addTab(r.value);
      }
    });

    const first = Object.keys(packs)[0];
    if (first) renderPack(first);
    else gridEl.innerHTML = '<div id="message">No sticker packs could be loaded.</div>';

  } catch (e) {
    gridEl.innerHTML = `<div id="message">Failed to load packs:<br><code>${e.message}</code></div>`;
  }
}

load();
</script>
</body>
</html>
